<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DummyTalk | Telegram Style</title>
    <style>
        :root {
            --bg: #0e1621; --sidebar: #17212b; --header: #17212b; 
            --accent: #2b5278; --accent-light: #3e6d99; --accent-btn: #2481cc;
            --recv: #182533; --text: #f5f5f5; --text-muted: #708499;
            --border: #1c2733; --danger: #ef5350; --success: #4dde9c;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* View Router */
        .view { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 10; background: var(--bg); flex-direction: column; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- AUTH VIEWS --- */
        #view-login, #view-register { justify-content: center; align-items: center; background: radial-gradient(circle at top, #1a2d42, #0e1621); }
        .auth-card { width: 100%; max-width: 380px; padding: 30px; text-align: center; background: var(--sidebar); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-logo { font-size: 3.5rem; margin-bottom: 15px; display: block; }
        .fgroup { margin-bottom: 15px; text-align: left; }
        .finput { width: 100%; background: #1c2733; border: 1px solid var(--border); padding: 12px 16px; border-radius: var(--radius); color: #fff; font-size: 1rem; outline: none; transition: 0.2s; }
        .finput:focus { border-color: var(--accent-btn); }
        
        .btn { width: 100%; padding: 12px; border-radius: var(--radius); border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1rem; color: #fff; background: var(--accent-btn); }
        .btn:hover { background: #3293e3; }
        
        /* Google Button Style */
        .btn-google { background: #fff; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn-google:hover { background: #f1f1f1; }
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-link { background: none; color: var(--accent-btn); margin-top: 15px; font-size: 0.9rem; border: none; cursor: pointer; }
        .alert { font-size: 0.85rem; padding: 10px; border-radius: 8px; margin-top: 15px; display: none; }
        .alert.err { background: rgba(239, 83, 80, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .alert.ok { background: rgba(77, 222, 156, 0.1); color: var(--success); border: 1px solid var(--success); }
        .reg-step { display: none; }
        .reg-step.active { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* --- CHAT VIEW --- */
        .chat-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar & Drawer */
        .sidebar { width: 320px; min-width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; z-index: 5; }
        .drawer { position: absolute; top: 0; left: -320px; width: 320px; height: 100%; background: var(--sidebar); z-index: 100; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
        .drawer.open { left: 0; }
        .drawer-header { padding: 20px; background: #1c2733; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .drawer-content { padding: 20px; flex: 1; overflow-y: auto; }
        .menu-icon { font-size: 1.5rem; color: var(--text-muted); cursor: pointer; padding: 5px; }
        .menu-icon:hover { color: #fff; }

        /* Search & Lists */
        .search-wrap { padding: 10px 15px; border-bottom: 1px solid var(--border); background: var(--sidebar); }
        .search-input { width: 100%; background: #242f3d; border: none; padding: 10px 15px; border-radius: 20px; color: #fff; outline: none; }
        .contact-list { flex: 1; overflow-y: auto; }
        .c-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .c-item:hover { background: #242f3d; }
        .av-wrapper { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
        .av { width: 100%; height: 100%; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; overflow: hidden; }
        .av img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background: var(--success); border: 2px solid var(--sidebar); border-radius: 50%; display: none; }
        .c-info { flex: 1; overflow: hidden; }
        .c-name { font-weight: 600; font-size: 1rem; color: #fff; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .c-msg { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; margin-top: 3px; }

        /* Main Chat Area */
        .chat-main { flex: 1; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: rgba(14, 22, 33, 0.95); position: relative; }
        .chat-header { height: 60px; background: var(--header); display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid var(--border); z-index: 2; }
        .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.1rem; flex-direction: column; gap: 10px; }
        .empty-chat span { font-size: 3rem; opacity: 0.5; }

        /* Messages */
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { max-width: 65%; padding: 8px 12px; border-radius: 14px; position: relative; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; display: flex; flex-direction: column; }
        .mine { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: var(--recv); border-bottom-left-radius: 4px; }
        .msg-meta { display: flex; justify-content: flex-end; align-items: center; gap: 4px; font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .tick { font-size: 0.75rem; }
        .tick.read { color: #60a5fa; }

        /* Input */
        .input-area { padding: 12px 20px; background: var(--header); display: flex; align-items: center; gap: 15px; }
        .msg-input { flex: 1; background: #1c2733; border: none; padding: 14px 20px; border-radius: 25px; color: #fff; font-size: 1rem; outline: none; }
        .send-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--accent-btn); border: none; color: #fff; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .send-btn:hover { background: #3293e3; transform: scale(1.05); }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; transition: 0.3s transform; }
            .sidebar.hide { transform: translateX(-100%); }
            .chat-main { width: 100%; position: absolute; height: 100%; }
            #back-btn { display: block !important; }
        }
        #back-btn { display: none; background: none; border: none; color: var(--accent-btn); font-size: 1.8rem; cursor: pointer; margin-right: 5px; }
    </style>
</head>
<body>

<div class="view active" id="view-login">
    <div class="auth-card">
        <span class="auth-logo">💬</span>
        <h2 style="margin-bottom: 5px;">DummyTalk</h2>
        <p style="color:var(--text-muted); margin-bottom: 25px;">Sign in to continue</p>
        
        <div class="fgroup"><input type="email" id="log-email" class="finput" placeholder="Email address"></div>
        <div class="fgroup"><input type="password" id="log-pass" class="finput" placeholder="Password"></div>
        <button class="btn" onclick="login()">Sign In</button>
        
        <div class="divider">OR</div>
        <button class="btn btn-google" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G"> Continue with Google
        </button>

        <div class="alert err" id="log-err"></div>
        <div class="alert ok" id="log-ok"></div>
        
        <button class="btn-link" onclick="forgotPassword()">Forgot Password?</button>
        <p style="margin-top: 20px; font-size: 0.9rem;">No account? <a href="#" onclick="switchView('register')" style="color:var(--accent-btn)">Register</a></p>
    </div>
</div>

<div class="view" id="view-register">
    <div class="auth-card">
        <span class="auth-logo">✨</span>
        <h2 style="margin-bottom: 25px;">Create Account</h2>
        
        <div class="reg-step active" id="step-1">
            <div class="fgroup"><input type="email" id="reg-email" class="finput" placeholder="Email address"></div>
            <div class="fgroup"><input type="password" id="reg-pass" class="finput" placeholder="Password (min 6 chars)"></div>
            <button class="btn" onclick="nextStep(2)">Next ➔</button>
            <div class="divider">OR</div>
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G"> Continue with Google
            </button>
        </div>

        <div class="reg-step" id="step-2">
            <div class="fgroup"><input type="text" id="reg-name" class="finput" placeholder="Full Name"></div>
            <div class="fgroup"><input type="text" id="reg-uname" class="finput" placeholder="Username (e.g. john_doe)"></div>
            <button class="btn" onclick="nextStep(3)">Next ➔</button>
            <button class="btn-link" onclick="nextStep(1)">Back</button>
        </div>

        <div class="reg-step" id="step-3">
            <p style="color:var(--text-muted); margin-bottom: 15px;">Add a profile photo (Optional)</p>
            <label style="cursor:pointer; display:block; margin:0 auto 20px; width:90px; height:90px; border-radius:50%; border:2px dashed var(--accent-btn); display:flex; align-items:center; justify-content:center; overflow:hidden;" id="reg-photo-preview">
                <span style="font-size:2rem;">📷</span>
                <input type="file" id="reg-photo" hidden accept="image/*">
            </label>
            <button class="btn" onclick="register()">Finish Registration</button>
            <button class="btn-link" onclick="nextStep(2)">Back</button>
        </div>

        <div class="alert err" id="reg-err"></div>
        <p style="margin-top: 20px; font-size: 0.9rem;"><a href="#" onclick="switchView('login')" style="color:var(--text-muted)">Cancel</a></p>
    </div>
</div>

<div class="view" id="view-chat">
    <div class="chat-container">
        
        <div class="sidebar" id="sidebar">
            <div class="drawer" id="profile-drawer">
                <div class="drawer-header" onclick="toggleDrawer()">
                    <span style="font-size: 1.5rem;">←</span>
                    <span style="font-size: 1.2rem; font-weight: 600;">Settings</span>
                </div>
                <div class="drawer-content">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <div class="av" id="dr-av" style="width:100px; height:100px; margin: 0 auto 15px; font-size: 3rem;">?</div>
                        <h2 id="dr-name">User Name</h2>
                        <p id="dr-uname" style="color:var(--accent-btn);">@username</p>
                    </div>
                    <div class="fgroup">
                        <label style="color:var(--text-muted); font-size:0.8rem;">Email Address</label>
                        <p id="dr-email" style="padding: 10px 0;">email@example.com</p>
                    </div>
                    <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0;">
                    <button class="btn" style="background:#242f3d; margin-bottom:10px;" onclick="changePasswordPrompt()">🔑 Change Password</button>
                    <button class="btn" style="background:rgba(239, 83, 80, 0.1); color:var(--danger);" onclick="logout()">🚪 Log Out</button>
                </div>
            </div>

            <div style="padding: 15px; display:flex; align-items:center; gap:15px; background:var(--header);">
                <div class="menu-icon" onclick="toggleDrawer()">☰</div>
                <div class="search-wrap" style="flex:1; padding:0; border:none;">
                    <input type="text" id="search-input" class="search-input" placeholder="Search users...">
                </div>
            </div>

            <div class="contact-list" id="contact-list"></div>
        </div>

        <div class="chat-main" id="chat-main">
            <div class="empty-chat" id="empty-state">
                <span>💬</span>
                <p>Select a chat to start messaging</p>
            </div>

            <div id="active-chat" style="display:none; flex-direction:column; height:100%;">
                <div class="chat-header">
                    <button id="back-btn" onclick="closeChat()">‹</button>
                    <div class="av" id="chat-av" style="width:42px; height:42px;">?</div>
                    <div>
                        <div id="chat-name" style="font-weight: 600; font-size: 1.05rem;">Name</div>
                        <div id="chat-status" style="font-size: 0.8rem; color: var(--text-muted);">offline</div>
                    </div>
                </div>

                <div class="msg-area" id="msg-area"></div>

                <div class="input-area">
                    <input type="text" id="msg-input" class="msg-input" placeholder="Write a message...">
                    <button class="send-btn" onclick="sendMessage()">➔</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
// --- 1. CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyAkizJq8d1CB84jhkejFRb8iFKnf_lsldg",
    authDomain: "dummytalk-b540c.firebaseapp.com",
    databaseURL: "https://dummytalk-b540c-default-rtdb.firebaseio.com",
    projectId: "dummytalk-b540c",
    storageBucket: "dummytalk-b540c.firebasestorage.app",
    messagingSenderId: "513786860365",
    appId: "1:513786860365:web:52e6f3110244d8dae65d04"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();

// Global State
let myUser = null;
let currentChatUid = null;
let currentChatId = null;
let messagesRef = null;
let presenceRef = null;

// Utility
const G = id => document.getElementById(id);
const showErr = (id, msg) => { G(id).innerText = msg; G(id).style.display = 'block'; setTimeout(()=>G(id).style.display='none', 4000); }
const showOk = (id, msg) => { G(id).innerText = msg; G(id).style.display = 'block'; setTimeout(()=>G(id).style.display='none', 4000); }
function switchView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    G('view-' + view).classList.add('active');
}

// --- 2. AUTHENTICATION LOGIC ---

// Monitor Auth State
auth.onAuthStateChanged(user => {
    if (user) {
        // Allow if email is verified OR if they logged in via Google (Google sets providerData)
        const isGoogle = user.providerData.some(p => p.providerId === 'google.com');
        if (!user.emailVerified && !isGoogle) {
            auth.signOut();
            switchView('login');
            showErr('log-err', 'Please verify your email address first.');
        } else {
            myUser = user;
            switchView('chat');
            initApp();
        }
    } else {
        myUser = null;
        switchView('login');
    }
});

// Google Login
async function loginWithGoogle() {
    try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await auth.signInWithPopup(provider);
        const u = result.user;
        
        // Check if user exists in our DB, if not, create their profile automatically
        const snap = await db.ref('users/' + u.uid).once('value');
        if (!snap.exists()) {
            const generatedUname = (u.email.split('@')[0] + Math.floor(Math.random() * 999)).replace(/[^a-z0-9]/g, '_');
            await db.ref('users/' + u.uid).set({
                uid: u.uid,
                name: u.displayName || 'Google User',
                username: generatedUname,
                email: u.email,
                photo: u.photoURL || '',
                online: true
            });
        }
    } catch(err) {
        showErr('log-err', err.message);
    }
}

// Multi-step Registration UI
let regFile = null;
G('reg-photo').onchange = e => {
    regFile = e.target.files[0];
    if(regFile) {
        const reader = new FileReader();
        reader.onload = ev => G('reg-photo-preview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
        reader.readAsDataURL(regFile);
    }
};
function nextStep(n) {
    if (n === 2) {
        const em = G('reg-email').value;
        if (!em || !em.includes('@')) return showErr('reg-err', 'Valid email required');
        G('reg-uname').value = em.split('@')[0].replace(/[^a-z0-9]/g, '_') + Math.floor(Math.random()*999);
    }
    document.querySelectorAll('.reg-step').forEach(s => s.classList.remove('active'));
    G('step-' + n).classList.add('active');
}

// Custom Email Registration
async function register() {
    const email = G('reg-email').value, pass = G('reg-pass').value;
    const name = G('reg-name').value, uname = G('reg-uname').value.toLowerCase();
    
    if(!name || !uname) return showErr('reg-err', 'Name and Username required');
    
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.sendEmailVerification();
        
        let photoUrl = "";
        if(regFile) {
            const ref = storage.ref(`avatars/${cred.user.uid}`);
            await ref.put(regFile);
            photoUrl = await ref.getDownloadURL();
        }

        await db.ref('users/' + cred.user.uid).set({
            uid: cred.user.uid, name: name, username: uname, email: email, photo: photoUrl, online: false
        });

        auth.signOut();
        switchView('login');
        showOk('log-ok', 'Verification email sent! Check your inbox.');
    } catch(e) { showErr('reg-err', e.message); }
}

// Login & Forgot Password
async function login() {
    const e = G('log-email').value, p = G('log-pass').value;
    if(!e || !p) return showErr('log-err', 'Enter email and password');
    try { await auth.signInWithEmailAndPassword(e, p); } 
    catch(err) { showErr('log-err', 'Invalid credentials'); }
}
async function forgotPassword() {
    const e = G('log-email').value;
    if(!e) return showErr('log-err', 'Enter your email first');
    try { await auth.sendPasswordResetEmail(e); showOk('log-ok', 'Password reset email sent!'); }
    catch(err) { showErr('log-err', err.message); }
}

// --- 3. APP INITIALIZATION & PROFILE ---
function initApp() {
    // Load Profile Data into Drawer with Strict Fallbacks
    db.ref('users/' + myUser.uid).on('value', snap => {
        const d = snap.val() || {};
        
        // Fallbacks prevent "undefined" if DB is missing fields
        const safeName = d.name || myUser.displayName || 'User';
        const safeUname = d.username || 'user_' + myUser.uid.slice(0, 5);
        const safeEmail = d.email || myUser.email || 'No email provided';
        const safePhoto = d.photo || myUser.photoURL || '';

        G('dr-name').innerText = safeName;
        G('dr-uname').innerText = '@' + safeUname;
        G('dr-email').innerText = safeEmail;
        G('dr-av').innerHTML = safePhoto ? `<img src="${safePhoto}">` : safeName[0];
    });

    // Set Online Presence
    const myOnlineRef = db.ref('users/' + myUser.uid + '/online');
    const myLastSeenRef = db.ref('users/' + myUser.uid + '/lastSeen');
    
    db.ref('.info/connected').on('value', snap => {
        if (snap.val() === true) {
            myOnlineRef.onDisconnect().set(false);
            myLastSeenRef.onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
            myOnlineRef.set(true);
        }
    });

    loadRecentChats();
}

function toggleDrawer() { G('profile-drawer').classList.toggle('open'); }

async function changePasswordPrompt() {
    const newPass = prompt("Enter new password (min 6 chars):");
    if(newPass && newPass.length >= 6) {
        try { await myUser.updatePassword(newPass); alert("Password updated successfully!"); }
        catch(e) { alert(e.message); }
    }
}

function logout() {
    db.ref('users/' + myUser.uid + '/online').set(false);
    db.ref('users/' + myUser.uid + '/lastSeen').set(firebase.database.ServerValue.TIMESTAMP);
    auth.signOut();
}

// --- 4. SEARCH & CHAT LIST ---
G('search-input').oninput = e => {
    const q = e.target.value.toLowerCase();
    if(q.length === 0) return loadRecentChats();
    
    db.ref('users').orderByChild('username').startAt(q).endAt(q+"\uf8ff").once('value', snap => {
        let html = '';
        snap.forEach(c => {
            const u = c.val();
            if(u.uid === myUser.uid) return;
            const av = u.photo ? `<img src="${u.photo}">` : (u.name ? u.name[0] : '?');
            html += `
            <div class="c-item" onclick="openChat('${u.uid}', '${u.name || 'User'}', '${u.photo || ''}', '${u.username || ''}')">
                <div class="av-wrapper"><div class="av">${av}</div></div>
                <div class="c-info">
                    <div class="c-name">${u.name || 'User'}</div>
                    <div class="c-msg">@${u.username || 'unknown'}</div>
                </div>
            </div>`;
        });
        G('contact-list').innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text-muted)">No users found</div>';
    });
};

function loadRecentChats() {
    db.ref('users').limitToFirst(20).once('value', snap => {
        let html = '';
        snap.forEach(c => {
            const u = c.val();
            if(u.uid === myUser.uid) return;
            const av = u.photo ? `<img src="${u.photo}">` : (u.name ? u.name[0] : '?');
            const dot = u.online ? 'display:block;' : '';
            html += `
            <div class="c-item" onclick="openChat('${u.uid}', '${u.name || 'User'}', '${u.photo || ''}', '${u.username || ''}')">
                <div class="av-wrapper">
                    <div class="av">${av}</div>
                    <div class="online-dot" style="${dot}"></div>
                </div>
                <div class="c-info">
                    <div class="c-name">${u.name || 'User'}</div>
                    <div class="c-msg">Tap to chat</div>
                </div>
            </div>`;
        });
        G('contact-list').innerHTML = html;
    });
}

// --- 5. MESSAGING LOGIC ---
function openChat(uid, name, photo, username) {
    currentChatUid = uid;
    currentChatId = [myUser.uid, uid].sort().join('_');
    
    // UI Updates
    G('empty-state').style.display = 'none';
    G('active-chat').style.display = 'flex';
    G('chat-name').innerText = name;
    G('chat-av').innerHTML = photo ? `<img src="${photo}">` : name[0];
    if(window.innerWidth <= 768) G('sidebar').classList.add('hide');

    // Clean up old listeners
    if(messagesRef) messagesRef.off();
    if(presenceRef) presenceRef.off();

    // Listen to Target User Presence
    presenceRef = db.ref('users/' + uid);
    presenceRef.on('value', snap => {
        const d = snap.val();
        if(!d) return;
        if(d.online) {
            G('chat-status').innerText = 'online';
            G('chat-status').style.color = 'var(--success)';
        } else {
            const time = d.lastSeen ? new Date(d.lastSeen).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'a while ago';
            G('chat-status').innerText = 'last seen at ' + time;
            G('chat-status').style.color = 'var(--text-muted)';
        }
    });

    // Listen to Messages
    messagesRef = db.ref('messages/' + currentChatId);
    messagesRef.on('value', snap => {
        let html = '';
        snap.forEach(m => {
            const msg = m.val();
            const isMine = msg.sender === myUser.uid;
            const time = new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            
            // Ticks logic
            let ticks = '';
            if (isMine) {
                ticks = msg.read ? '<span class="tick read">✓✓</span>' : '<span class="tick">✓</span>';
            } else if (!msg.read) {
                // Mark received message as read
                db.ref(`messages/${currentChatId}/${m.key}`).update({read: true});
            }

            html += `
            <div class="bubble ${isMine ? 'mine' : 'theirs'}">
                <div>${msg.text}</div>
                <div class="msg-meta">${time} ${ticks}</div>
            </div>`;
        });
        const area = G('msg-area');
        area.innerHTML = html;
        area.scrollTop = area.scrollHeight;
    });
}

function closeChat() {
    G('sidebar').classList.remove('hide');
    G('empty-state').style.display = 'flex';
    G('active-chat').style.display = 'none';
    currentChatUid = null;
    currentChatId = null;
}

function sendMessage() {
    const text = G('msg-input').value.trim();
    if(!text || !currentChatId) return;
    
    db.ref('messages/' + currentChatId).push({
        sender: myUser.uid, text: text, timestamp: firebase.database.ServerValue.TIMESTAMP, read: false
    });
    G('msg-input').value = '';
}

// Enter key to send
G('msg-input').onkeypress = e => { if(e.key === 'Enter') sendMessage(); };

</script>
