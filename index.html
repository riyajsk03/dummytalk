<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DummyTalk | Premium Messaging</title>
<style>
:root {
  --bg: #0e1621;
  --sidebar: #17212b;
  --header: #17212b;
  --accent: #2481cc;
  --accent-hover: #288fde;
  --sent: #2b5278;
  --recv: #182533;
  --text: #f5f5f5;
  --text-muted: #708499;
  --border: #1c2733;
  --success: #4dde9c;
  --danger: #ef5350;
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* Views & Animations */
.view { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; animation: fadeIn 0.3s ease; }
.view.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

/* Auth Components */
#view-login, #view-register { justify-content: center; align-items: center; background: radial-gradient(circle at top right, #1a2d42, #0e1621); }
.auth-card { width: 100%; max-width: 360px; padding: 30px; text-align: center; }
.auth-logo { font-size: 4rem; margin-bottom: 20px; display: block; }
.auth-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.auth-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5; }

.fgroup { text-align: left; margin-bottom: 15px; position: relative; }
.finput { width: 100%; background: #1c2733; border: 1px solid #2b3a4a; padding: 12px 16px; border-radius: var(--radius); color: #fff; font-size: 1rem; outline: none; transition: border 0.2s; }
.finput:focus { border-color: var(--accent); }

.btn { width: 100%; padding: 12px; border-radius: var(--radius); border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1rem; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-link { background: none; color: var(--accent); font-size: 0.85rem; margin-top: 10px; }

/* Multi-step Logic */
.reg-step { display: none; }
.reg-step.active { display: block; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

/* Chat Layout */
#view-chat { flex-direction: row; }
.sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }

/* Header */
.header { height: 56px; background: var(--header); display: flex; align-items: center; padding: 0 16px; gap: 12px; border-bottom: 1px solid var(--border); }
.av-small { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
.av-small img { width: 100%; height: 100%; object-fit: cover; }

/* Messages */
.msg-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: rgba(14, 22, 33, 0.9); }
.bubble { max-width: 70%; padding: 8px 14px; border-radius: 18px; position: relative; font-size: 0.95rem; line-height: 1.4; }
.mine { align-self: flex-end; background: var(--sent); color: #fff; border-bottom-right-radius: 4px; }
.theirs { align-self: flex-start; background: var(--recv); color: #fff; border-bottom-left-radius: 4px; }

/* Footer Input */
.input-area { padding: 10px 16px; background: var(--header); display: flex; gap: 10px; align-items: center; }
.msg-input { flex: 1; background: #1c2733; border: none; padding: 12px 16px; border-radius: 22px; color: #fff; outline: none; }

/* Profile Preview */
.photo-preview { width: 100px; height: 100px; border-radius: 50%; background: #2b3a4a; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px dashed var(--accent); cursor: pointer; overflow: hidden; }
.photo-preview img { width: 100%; height: 100%; object-fit: cover; }

.alert { font-size: 0.8rem; margin-top: 10px; display: none; padding: 8px; border-radius: 8px; }
.err { background: rgba(239, 83, 80, 0.1); color: var(--danger); }
.ok { background: rgba(77, 222, 156, 0.1); color: var(--success); }

@media (max-width: 768px) {
    .sidebar { width: 100%; }
    .chat-main { display: none; }
    .chat-main.active { display: flex; position: fixed; inset: 0; z-index: 100; }
}
</style>
</head>
<body>

<div class="view active" id="view-login">
  <div class="auth-card">
    <span class="auth-logo">💬</span>
    <h2 class="auth-title">Sign in</h2>
    <p class="auth-sub">Enter your email and password to continue</p>
    
    <div class="fgroup">
      <input type="email" id="login-email" class="finput" placeholder="Email address">
    </div>
    <div class="fgroup">
      <input type="password" id="login-pass" class="finput" placeholder="Password">
    </div>
    
    <button class="btn btn-primary" id="btn-login">Next</button>
    <button class="btn btn-link" id="btn-forgot">Forgot password?</button>
    <div id="login-alert" class="alert err"></div>
    <p class="auth-sub" style="margin-top:20px">Don't have an account? <a href="#" id="go-reg" style="color:var(--accent)">Register</a></p>
  </div>
</div>

<div class="view" id="view-register">
  <div class="auth-card">
    <span class="auth-logo">✨</span>
    <h2 class="auth-title">Create Account</h2>
    
    <div class="reg-step active" id="step-1">
      <p class="auth-sub">What is your email address?</p>
      <div class="fgroup">
        <input type="email" id="reg-email" class="finput" placeholder="Email">
      </div>
      <div class="fgroup">
        <input type="password" id="reg-pass" class="finput" placeholder="Password (min. 6 characters)">
      </div>
      <button class="btn btn-primary" onclick="toStep(2)">Next</button>
    </div>

    <div class="reg-step" id="step-2">
      <p class="auth-sub">Choose how others see you</p>
      <div class="fgroup">
        <input type="text" id="reg-name" class="finput" placeholder="Full Name">
      </div>
      <div class="fgroup">
        <input type="text" id="reg-username" class="finput" placeholder="Username">
      </div>
      <button class="btn btn-primary" onclick="toStep(3)">Next</button>
    </div>

    <div class="reg-step" id="step-3">
      <p class="auth-sub">Add a profile picture (optional)</p>
      <label for="reg-photo-input">
        <div class="photo-preview" id="photo-preview-el">➕</div>
      </label>
      <input type="file" id="reg-photo-input" hidden accept="image/*">
      <button class="btn btn-primary" id="btn-finalize">Complete Registration</button>
    </div>

    <div id="reg-alert" class="alert err"></div>
    <button class="btn btn-link" id="go-login">Back to Sign In</button>
  </div>
</div>

<div class="view" id="view-chat">
  <div class="sidebar">
    <div class="header">
        <div class="av-small" id="my-profile-av">?</div>
        <div style="flex:1; font-weight:600">Chats</div>
        <button id="btn-logout" style="background:none; border:none; color:var(--text-muted); cursor:pointer">Logout</button>
    </div>
    <div id="conversations" style="flex:1; overflow-y:auto;">
        </div>
  </div>
  <div class="chat-main" id="chat-window">
    <div class="header" id="chat-header">
        <div class="av-small" id="target-av">?</div>
        <div>
            <div id="target-name" style="font-weight:600; font-size:0.95rem">Select a chat</div>
            <div id="target-status" style="font-size:0.75rem; color:var(--text-muted)">offline</div>
        </div>
    </div>
    <div class="msg-container" id="msg-list"></div>
    <div class="input-area">
        <input type="text" class="msg-input" id="msg-input" placeholder="Message">
        <button id="btn-send" style="background:none; border:none; color:var(--accent); font-size:1.5rem; cursor:pointer">➔</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
// --- CONFIG (Reusing your provided keys) ---
const firebaseConfig = {
  apiKey: "AIzaSyAkizJq8d1CB84jhkejFRb8iFKnf_lsldg",
  authDomain: "dummytalk-b540c.firebaseapp.com",
  databaseURL: "https://dummytalk-b540c-default-rtdb.firebaseio.com",
  projectId: "dummytalk-b540c",
  storageBucket: "dummytalk-b540c.firebasestorage.app",
  messagingSenderId: "513786860365",
  appId: "1:513786860365:web:52e6f3110244d8dae65d04"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();

const G = id => document.getElementById(id);
let selectedFile = null;

// --- VIEW ROUTER ---
function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    G('view-' + id).classList.add('active');
}

// --- AUTH LOGIC ---
G('go-reg').onclick = () => showView('register');
G('go-login').onclick = () => showView('login');

// Step Navigation & Auto-Username
function toStep(n) {
    if(n === 2) {
        const email = G('reg-email').value;
        if(!email.includes('@')) return showAlert('reg-alert', 'Enter a valid email');
        // Auto suggest username
        G('reg-username').value = email.split('@')[0].replace(/[^a-z0-9]/g, '_') + Math.floor(Math.random()*999);
    }
    document.querySelectorAll('.reg-step').forEach(s => s.classList.remove('active'));
    G('step-' + n).classList.add('active');
}

// Photo Preview
G('reg-photo-input').onchange = e => {
    selectedFile = e.target.files[0];
    if(selectedFile) {
        const reader = new FileReader();
        reader.onload = ev => G('photo-preview-el').innerHTML = `<img src="${ev.target.result}">`;
        reader.readAsDataURL(selectedFile);
    }
};

// Finalize Register with Verification
G('btn-finalize').onclick = async () => {
    const email = G('reg-email').value, pass = G('reg-pass').value;
    const name = G('reg-name').value, uname = G('reg-username').value;
    
    try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await cred.user.sendEmailVerification();
        
        let photoUrl = "";
        if(selectedFile) {
            const ref = storage.ref(`avatars/${cred.user.uid}`);
            await ref.put(selectedFile);
            photoUrl = await ref.getDownloadURL();
        }

        await db.ref('users/' + cred.user.uid).set({
            uid: cred.user.uid,
            name: name,
            username: uname,
            email: email,
            photo: photoUrl,
            verified: false
        });

        alert("Verification email sent! Please check your inbox before logging in.");
        showView('login');
    } catch(e) { showAlert('reg-alert', e.message); }
};

// Login with Verification Check
G('btn-login').onclick = async () => {
    const email = G('login-email').value, pass = G('login-pass').value;
    try {
        const res = await auth.signInWithEmailAndPassword(email, pass);
        if(!res.user.emailVerified) {
            showAlert('login-alert', 'Please verify your email address first.');
            auth.signOut();
            return;
        }
        showView('chat');
        initChat(res.user);
    } catch(e) { showAlert('login-alert', "Invalid credentials"); }
};

// Forgot Password
G('btn-forgot').onclick = async () => {
    const email = G('login-email').value;
    if(!email) return showAlert('login-alert', "Enter email first");
    try {
        await auth.sendPasswordResetEmail(email);
        alert("Password reset link sent to your email.");
    } catch(e) { showAlert('login-alert', e.message); }
};

// --- CHAT LOGIC ---
function initChat(user) {
    db.ref('users/' + user.uid).on('value', snap => {
        const d = snap.val();
        if(d.photo) G('my-profile-av').innerHTML = `<img src="${d.photo}">`;
    });
    // Add real-time message listeners, conversation loading, etc. here
}

function showAlert(id, msg) {
    const el = G(id);
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
}

auth.onAuthStateChanged(user => {
    if(user && user.emailVerified) {
        showView('chat');
        initChat(user);
    } else {
        showView('login');
    }
});

G('btn-logout').onclick = () => auth.signOut();
</script>

</body>
</html>
