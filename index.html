<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DummyTalk | Dark Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #13131a;
            --bg-panel: #1c1c24;
            --bg-hover: #252530;
            --accent: #7c5dff;
            --accent-hover: #6a4cea;
            --text-main: #ffffff;
            --text-muted: #8b8e9f;
            --bubble-mine: #7c5dff;
            --bubble-theirs: #252530;
            --danger: #ff4b4b;
            --success: #00e676;
            --radius-xl: 35px;
            --radius-lg: 20px;
            --radius-pill: 50px;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* View Router */
        .view { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; z-index: 10; background: var(--bg-base); flex-direction: column; }
        .view.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- AUTH VIEWS --- */
        #view-login, #view-register { justify-content: center; align-items: center; background: radial-gradient(circle at top left, #1c1c24, #13131a); }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; background: var(--bg-panel); border-radius: var(--radius-xl); box-shadow: var(--shadow); }
        .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .auth-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        
        .fgroup { margin-bottom: 20px; text-align: left; }
        .finput { width: 100%; background: var(--bg-base); border: 1px solid transparent; padding: 16px 20px; border-radius: var(--radius-lg); color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .finput:focus { border-color: var(--accent); background: #181820; }
        
        .btn { width: 100%; padding: 16px; border-radius: var(--radius-lg); border: none; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 15px; color: #fff; background: var(--accent); box-shadow: 0 5px 15px rgba(124, 93, 255, 0.3); }
        .btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
        .btn-google { background: #fff; color: #13131a; box-shadow: none; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn-google:hover { background: #f0f0f0; transform: translateY(0); }
        .btn-link { background: none; color: var(--accent); margin-top: 15px; font-size: 14px; border: none; cursor: pointer; box-shadow: none; padding: 0; width: auto; font-weight: 500; }
        
        .reg-step { display: none; }
        .reg-step.active { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* --- CHAT APP LAYOUT --- */
        .chat-container { display: flex; height: 100vh; width: 100vw; background: var(--bg-base); }
        
        /* 1. SIDEBAR (Chat List) */
        .sidebar { width: 380px; min-width: 380px; background: var(--bg-base); display: flex; flex-direction: column; position: relative; z-index: 5; border-right: 1px solid rgba(255,255,255,0.03); }
        
        .sb-header { padding: 35px 30px 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sb-greeting { font-size: 15px; color: var(--text-muted); line-height: 1.2; }
        .sb-name { font-size: 28px; font-weight: 700; color: var(--text-main); }
        .sb-actions { display: flex; gap: 12px; }
        .icon-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.05); color: var(--text-main); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .icon-btn:hover { background: var(--bg-hover); color: var(--accent); }

        .sb-tabs { display: flex; background: var(--bg-panel); margin: 0 30px 20px; border-radius: var(--radius-pill); padding: 5px; }
        .sb-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 500; color: var(--text-muted); border-radius: var(--radius-pill); cursor: pointer; transition: 0.3s; }
        .sb-tab.active { background: var(--accent); color: #fff; box-shadow: 0 4px 10px rgba(124, 93, 255, 0.3); }

        .search-bar { padding: 0 30px 15px; display: none; }
        .search-bar.active { display: block; animation: fadeIn 0.2s; }

        .contact-list { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .c-item { display: flex; align-items: center; gap: 15px; padding: 15px 10px; border-radius: var(--radius-lg); cursor: pointer; transition: 0.2s; }
        .c-item:hover { background: var(--bg-panel); }
        .av { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; overflow: hidden; flex-shrink: 0; }
        .av img { width: 100%; height: 100%; object-fit: cover; }
        
        .c-info { flex: 1; overflow: hidden; }
        .c-name-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .c-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .c-time { font-size: 12px; color: var(--text-muted); }
        .c-msg-row { display: flex; justify-content: space-between; align-items: center; }
        .c-msg { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unread-badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 600; min-width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0 6px; }

        .fab { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 28px; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(124, 93, 255, 0.4); display: flex; align-items: center; justify-content: center; transition: 0.3s; z-index: 10; }
        .fab:hover { transform: scale(1.05); }

        /* Drawer (Profile/Settings) */
        .drawer { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; z-index: 100; background: var(--bg-panel); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .drawer.open { left: 0; }
        
        /* 2. MAIN CHAT AREA */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-base); }
        
        .chat-header { height: 90px; background: var(--bg-panel); border-bottom-left-radius: 40px; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .ch-left { display: flex; align-items: center; gap: 15px; }
        .ch-info { display: flex; flex-direction: column; }
        .ch-name { font-weight: 600; font-size: 16px; }
        .ch-status { font-size: 12px; color: var(--accent); font-weight: 500; }
        .ch-actions { display: flex; gap: 10px; }

        .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
        .empty-icon { font-size: 60px; margin-bottom: 15px; opacity: 0.2; }

        /* Messages */
        .msg-area { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 12px; }
        .bubble-wrap { display: flex; flex-direction: column; max-width: 70%; position: relative; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bubble-wrap.mine { align-self: flex-end; }
        .bubble-wrap.theirs { align-self: flex-start; }
        
        .bubble { padding: 14px 20px; font-size: 14px; line-height: 1.5; word-wrap: break-word; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .mine .bubble { background: var(--bubble-mine); color: #fff; border-radius: 20px 20px 5px 20px; }
        .theirs .bubble { background: var(--bubble-theirs); color: var(--text-main); border-radius: 20px 20px 20px 5px; }
        
        .msg-meta { font-size: 11px; margin-top: 5px; opacity: 0.6; display: flex; justify-content: flex-end; gap: 5px; }
        .theirs .msg-meta { justify-content: flex-start; }

        /* Floating Input Area */
        .chat-footer { padding: 20px 30px 30px; display: flex; align-items: flex-end; gap: 15px; background: transparent; }
        .input-pill { flex: 1; background: var(--bg-panel); border-radius: var(--radius-pill); display: flex; align-items: center; padding: 8px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .msg-input { flex: 1; background: transparent; border: none; padding: 12px 10px; color: #fff; font-size: 14px; outline: none; }
        .msg-input::placeholder { color: var(--text-muted); }
        
        .send-btn { width: 55px; height: 55px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 8px 20px rgba(124, 93, 255, 0.4); transition: 0.3s; }
        .send-btn:hover { transform: scale(1.05); }

        /* Username Input Styling in Drawer */
        .username-field { display: flex; align-items: center; background: var(--bg-base); border-radius: var(--radius-lg); padding: 0 20px; transition: 0.3s; }
        .username-field:focus-within { border: 1px solid var(--accent); background: #181820; }
        .username-field span { color: var(--accent); font-weight: 600; font-size: 14px; }
        .username-field input { border: none; background: transparent; padding: 16px 5px; flex: 1; outline: none; color: #fff; font-size: 14px; }

        /* Mobile */
        #back-btn { display: none; background: none; border: none; color: var(--text-main); font-size: 24px; cursor: pointer; margin-right: 5px; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; border-right: none; position: absolute; height: 100%; transition: 0.3s transform; }
            .sidebar.hide { transform: translateX(-100%); }
            .chat-main { width: 100%; position: absolute; height: 100%; transform: translateX(100%); transition: 0.3s transform; }
            .chat-main.active { transform: translateX(0); }
            #back-btn { display: block; }
            .chat-header { border-bottom-left-radius: 0; padding: 0 20px; }
            .chat-footer { padding: 15px 20px 20px; }
            .sb-header { padding: 25px 20px 20px; }
        }
    </style>
</head>
<body>

<div class="view active" id="view-login">
    <div class="auth-card">
        <div class="auth-title">Welcome Back</div>
        <div class="auth-sub">Sign in to continue to DummyTalk</div>
        <div class="fgroup"><input type="email" id="log-email" class="finput" placeholder="Email Address"></div>
        <div class="fgroup"><input type="password" id="log-pass" class="finput" placeholder="Password"></div>
        <button class="btn" onclick="login()">Sign In</button>
        <button class="btn btn-google" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G"> Continue with Google
        </button>
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn-link" onclick="forgotPassword()">Forgot Password?</button>
            <p style="margin-top: 15px; font-size: 13px; color: var(--text-muted);">New here? <button class="btn-link" onclick="switchView('register')">Create an account</button></p>
        </div>
    </div>
</div>

<div class="view" id="view-register">
    <div class="auth-card">
        <div class="auth-title">Create Account</div>
        <div class="auth-sub">Join DummyTalk today</div>
        
        <div class="reg-step active" id="step-1">
            <div class="fgroup"><input type="email" id="reg-email" class="finput" placeholder="Email address"></div>
            <div class="fgroup"><input type="password" id="reg-pass" class="finput" placeholder="Password (min 6 chars)"></div>
            <button class="btn" onclick="nextStep(2)">Continue</button>
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G"> Continue with Google
            </button>
        </div>

        <div class="reg-step" id="step-2">
            <div class="fgroup"><input type="text" id="reg-name" class="finput" placeholder="Full Name"></div>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px; text-align:center;">Add a Profile Photo</p>
            <label style="display:block; margin:0 auto 20px; width:80px; height:80px; border-radius:50%; border:2px dashed var(--accent); display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer;" id="reg-photo-preview">
                <span style="font-size:24px;">📷</span>
                <input type="file" id="reg-photo" hidden accept="image/*">
            </label>
            <button class="btn" onclick="register()">Create Account</button>
            <button class="btn-link" onclick="nextStep(1)" style="display:block; margin: 15px auto 0;">Back</button>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <p style="font-size: 13px; color: var(--text-muted);">Already have an account? <button class="btn-link" onclick="switchView('login')">Sign In</button></p>
        </div>
    </div>
</div>

<div class="view" id="view-chat">
    <div class="chat-container">
        
        <div class="sidebar" id="sidebar">
            <div class="drawer" id="profile-drawer">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 30px;">
                    <span style="font-size: 20px; font-weight: 600;">Settings</span>
                    <button class="icon-btn" onclick="toggleDrawer()">✕</button>
                </div>
                <div style="text-align: center; margin-bottom: 30px;">
                    <label style="cursor:pointer; display:block; margin:0 auto 15px; width:100px; height:100px;">
                        <div class="av" id="dr-av" style="width:100%; height:100%; font-size: 32px; margin: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">?</div>
                        <input type="file" id="dr-photo" hidden accept="image/*">
                    </label>
                    <div class="fgroup" style="margin-bottom: 10px;">
                        <input type="text" id="dr-name-in" class="finput" style="text-align:center; font-weight:600; font-size:16px;" placeholder="Full Name">
                    </div>
                    <div class="fgroup">
                        <div class="username-field">
                            <span>@</span>
                            <input type="text" id="dr-uname-in" placeholder="username">
                        </div>
                    </div>
                </div>
                <button class="btn" onclick="updateProfileData()" style="margin-bottom: 15px;">Save Profile</button>
                <button class="btn" style="background:var(--bg-base); color:var(--text-main);" onclick="changePasswordPrompt()">Change Password</button>
                <button class="btn" style="background:rgba(255, 75, 75, 0.1); color:var(--danger); margin-top:auto;" onclick="logout()">Log Out</button>
            </div>

            <div class="sb-header">
                <div>
                    <div class="sb-greeting">Hello,</div>
                    <div class="sb-name" id="sb-my-name">User</div>
                </div>
                <div class="sb-actions">
                    <button class="icon-btn" onclick="toggleSearch()">🔍</button>
                    <button class="icon-btn" onclick="toggleDrawer()">⋮</button>
                </div>
            </div>

            <div class="sb-tabs">
                <div class="sb-tab active">All Chats</div>
                <div class="sb-tab">Groups</div>
                <div class="sb-tab">Contacts</div>
            </div>

            <div class="search-bar" id="search-bar">
                <input type="text" id="search-input" class="finput" style="padding:12px 20px; border-radius:30px;" placeholder="Search users by username...">
            </div>

            <div class="contact-list" id="contact-list"></div>

            <button class="fab" onclick="toggleSearch()">+</button>
        </div>

        <div class="chat-main" id="chat-main">
            <div class="empty-chat" id="empty-state">
                <div class="empty-icon">💬</div>
                <h3>DummyTalk Premium</h3>
                <p>Select a chat to start messaging</p>
            </div>

            <div id="active-chat" style="display:none; flex-direction:column; height:100%;">
                
                <div class="chat-header">
                    <div class="ch-left">
                        <button id="back-btn" onclick="closeChat()">‹</button>
                        <div class="av" id="chat-av" style="width:46px; height:46px;">?</div>
                        <div class="ch-info">
                            <div class="ch-name" id="chat-name">Name</div>
                            <div class="ch-status" id="chat-status">Online</div>
                        </div>
                    </div>
                    <div class="ch-actions">
                        <button class="icon-btn">📹</button>
                        <button class="icon-btn">📞</button>
                    </div>
                </div>

                <div class="msg-area" id="msg-area"></div>

                <div class="chat-footer">
                    <div class="input-pill">
                        <input type="file" id="img-upload" hidden accept="image/*">
                        <button class="icon-btn" style="background:transparent; border:none; width:auto;" onclick="G('img-upload').click()">📎</button>
                        <input type="text" id="msg-input" class="msg-input" placeholder="Write a message..." autocomplete="off">
                        <button class="icon-btn" style="background:transparent; border:none; width:auto;">🎤</button>
                    </div>
                    <button class="send-btn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyAkizJq8d1CB84jhkejFRb8iFKnf_lsldg",
    authDomain: "dummytalk-b540c.firebaseapp.com",
    databaseURL: "https://dummytalk-b540c-default-rtdb.firebaseio.com",
    projectId: "dummytalk-b540c",
    storageBucket: "dummytalk-b540c.firebasestorage.app",
    messagingSenderId: "513786860365",
    appId: "1:513786860365:web:52e6f3110244d8dae65d04"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();

// Global State
let myUser=null, activeChatUid=null, activeChatId=null, messagesRef=null, presenceRef=null;
const G=id=>document.getElementById(id);
function switchView(view){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));G('view-'+view).classList.add('active');}
const formatTime=(ts)=>{const d=new Date(ts), today=new Date();if(d.toDateString()===today.toDateString())return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toLocaleDateString([],{month:'short',day:'numeric'});};

// --- UI TOGGLES ---
function toggleSearch() { 
    const sb = G('search-bar'); 
    sb.classList.toggle('active'); 
    if(sb.classList.contains('active')) G('search-input').focus();
}
function toggleDrawer(){ G('profile-drawer').classList.toggle('open'); }

// --- AUTH LOGIC ---
auth.onAuthStateChanged(user=>{
    if(user){
        const isGoogle = user.providerData.some(p=>p.providerId==='google.com');
        if(!user.emailVerified && !isGoogle){ auth.signOut(); switchView('login'); alert('Please verify your email address.'); }
        else{ myUser=user; switchView('chat'); initApp(); }
    }else{ myUser=null; switchView('login'); }
});

async function loginWithGoogle(){
    try{
        const provider = new firebase.auth.GoogleAuthProvider();
        const res = await auth.signInWithPopup(provider); const u = res.user;
        const snap = await db.ref('users/'+u.uid).once('value');
        if(!snap.exists()){
            const genUname = (u.email.split('@')[0]+Math.floor(Math.random()*999)).replace(/[^a-z0-9]/g,'_');
            await db.ref('users/'+u.uid).set({uid:u.uid, name:u.displayName||'User', username:genUname, email:u.email, photo:u.photoURL||'', online:true});
        }
    }catch(err){ alert(err.message); }
}

let regFile=null;
G('reg-photo').onchange=e=>{
    regFile=e.target.files[0];
    if(regFile){ const r=new FileReader(); r.onload=ev=>G('reg-photo-preview').innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`; r.readAsDataURL(regFile); }
};
function nextStep(n){ document.querySelectorAll('.reg-step').forEach(s=>s.classList.remove('active')); G('step-'+n).classList.add('active'); }

async function register(){
    const email=G('reg-email').value, pass=G('reg-pass').value, name=G('reg-name').value;
    if(!name)return alert('Name required');
    try{
        const cred = await auth.createUserWithEmailAndPassword(email,pass); await cred.user.sendEmailVerification();
        let photoUrl="";
        if(regFile){ const ref=storage.ref(`avatars/${cred.user.uid}`); await ref.put(regFile); photoUrl=await ref.getDownloadURL(); }
        await db.ref('users/'+cred.user.uid).set({uid:cred.user.uid, name:name, username:(email.split('@')[0]+Math.floor(Math.random()*99)).replace(/[^a-z0-9]/g,'_'), email:email, photo:photoUrl, online:false});
        auth.signOut(); switchView('login'); alert('Verification email sent! Please check your inbox.');
    }catch(e){ alert(e.message); }
}

async function login(){ const e=G('log-email').value, p=G('log-pass').value; try{ await auth.signInWithEmailAndPassword(e,p); }catch(err){ alert('Invalid credentials'); } }
async function forgotPassword(){ const e=G('log-email').value; if(!e)return alert('Enter email first'); try{ await auth.sendPasswordResetEmail(e); alert('Password reset sent!'); }catch(err){ alert(err.message); } }
function logout(){ db.ref('users/'+myUser.uid+'/online').set(false); auth.signOut(); }

// --- APP INIT (UPDATED WITH MISSING USERNAME FALLBACK FIX) ---
function initApp(){
    db.ref('users/'+myUser.uid).on('value',snap=>{
        const d=snap.val()||{}; 
        const sName=d.name||myUser.displayName||'User';
        const sPhoto=d.photo||myUser.photoURL||'';
        let sUname=d.username;

        // Auto-fix if username is missing (e.g. older account logic)
        if(!sUname) {
            sUname = (myUser.email ? myUser.email.split('@')[0] : 'user') + Math.floor(Math.random()*999);
            db.ref('users/'+myUser.uid).update({username: sUname});
        }

        G('sb-my-name').innerText = sName;
        G('dr-name-in').value = sName; 
        G('dr-uname-in').value = sUname;
        G('dr-av').innerHTML = sPhoto?`<img src="${sPhoto}">`:sName[0];
    });
    
    const myOnlineRef=db.ref('users/'+myUser.uid+'/online'), myLastSeenRef=db.ref('users/'+myUser.uid+'/lastSeen');
    db.ref('.info/connected').on('value',snap=>{ if(snap.val()===true){ myOnlineRef.onDisconnect().set(false); myLastSeenRef.onDisconnect().set(firebase.database.ServerValue.TIMESTAMP); myOnlineRef.set(true); }});
    loadRecentChats();
}

G('dr-photo').onchange=async e=>{
    const f=e.target.files[0]; if(!f)return;
    try{ const ref=storage.ref(`avatars/${myUser.uid}`); await ref.put(f); const url=await ref.getDownloadURL(); db.ref('users/'+myUser.uid+'/photo').set(url); G('dr-av').innerHTML=`<img src="${url}">`; }catch(err){ alert(err.message); }
};

// UPDATED PROFILE SAVE TO INCLUDE USERNAME
function updateProfileData() { 
    const newName = G('dr-name-in').value.trim();
    // Enforce lowercase, alphanumeric + underscores only
    let newUname = G('dr-uname-in').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
    
    if(!newName || !newUname) return alert("Name and username cannot be empty.");
    
    // Ideally, check for uniqueness here. For DummyTalk, we update it directly.
    db.ref('users/'+myUser.uid).update({
        name: newName,
        username: newUname
    }).then(()=>{
        alert("Profile updated successfully!");
        toggleDrawer();
    }).catch(err => alert(err.message));
}

async function changePasswordPrompt(){ const p=prompt("New password (min 6):"); if(p&&p.length>=6){ try{ await myUser.updatePassword(p); alert("Updated!"); }catch(e){ alert(e.message); } } }

// --- SIDEBAR DATA ---
G('search-input').oninput=e=>{
    const q=e.target.value.toLowerCase().replace('@','');
    if(q.length===0)return loadRecentChats();
    db.ref('users').orderByChild('username').startAt(q).endAt(q+"\uf8ff").once('value',snap=>{
        let html='';
        snap.forEach(c=>{
            const u=c.val(); if(u.uid===myUser.uid)return;
            const av=u.photo?`<img src="${u.photo}">`:(u.name?u.name[0]:'?');
            html+=`<div class="c-item" onclick="openChat('${u.uid}','${u.name}','${u.photo||''}')"><div class="av">${av}</div><div class="c-info"><div class="c-name-row"><span class="c-name">${u.name}</span></div><div class="c-msg-row"><span class="c-msg">@${u.username}</span></div></div></div>`;
        });
        G('contact-list').innerHTML=html||'<div style="text-align:center; padding:20px; color:var(--text-muted)">No users found</div>';
    });
};

function loadRecentChats(){
    db.ref('chats/'+myUser.uid).orderByChild('timestamp').on('value',snap=>{
        if(G('search-input').value.length>0)return;
        let chats=[]; snap.forEach(c=>{chats.push({id:c.key,...c.val()});}); chats.reverse();
        let html='';
        chats.forEach(c=>{
            const av=c.photo?`<img src="${c.photo}">`:(c.name?c.name[0]:'?');
            const badge=c.unreadCount>0?`<div class="unread-badge">${c.unreadCount}</div>`:'';
            html+=`<div class="c-item" onclick="openChat('${c.id}','${c.name}','${c.photo||''}')">
                <div class="av">${av}</div>
                <div class="c-info">
                    <div class="c-name-row"><span class="c-name">${c.name}</span><span class="c-time">${formatTime(c.timestamp)}</span></div>
                    <div class="c-msg-row"><span class="c-msg" style="${c.unreadCount>0?'color:var(--text-main); font-weight:600;':''}">${c.lastMessage}</span>${badge}</div>
                </div>
            </div>`;
        });
        G('contact-list').innerHTML=html||'<div style="text-align:center; padding:20px; color:var(--text-muted)">Search users to start chatting</div>';
    });
}

// --- CHAT LOGIC ---
function openChat(uid,name,photo){
    activeChatUid=uid; activeChatId=[myUser.uid,uid].sort().join('_');
    G('empty-state').style.display='none'; G('active-chat').style.display='flex';
    G('chat-name').innerText=name; G('chat-av').innerHTML=photo?`<img src="${photo}">`:name[0];
    if(window.innerWidth<=768){ G('sidebar').classList.add('hide'); G('chat-main').classList.add('active'); }
    
    if(messagesRef)messagesRef.off(); if(presenceRef)presenceRef.off();
    db.ref(`chats/${myUser.uid}/${uid}`).update({unreadCount:0});

    presenceRef=db.ref('users/'+uid); presenceRef.on('value',snap=>{
        const d=snap.val()||{}; 
        if(d.online){ G('chat-status').innerText='Online'; G('chat-status').style.color='var(--success)'; }
        else{ G('chat-status').innerText='Last seen '+formatTime(d.lastSeen); G('chat-status').style.color='var(--text-muted)'; }
    });
    
    messagesRef=db.ref('messages/'+activeChatId); messagesRef.on('value',snap=>{
        let html='';
        snap.forEach(m=>{
            const msg=m.val(); const isMine=msg.sender===myUser.uid;
            let ticks=isMine?(msg.read?'<span style="color:#60a5fa">✓✓</span>':'<span>✓</span>'):'';
            if(!isMine && !msg.read)db.ref(`messages/${activeChatId}/${m.key}`).update({read:true});
            const content = msg.imageUrl ? `<img src="${msg.imageUrl}" style="max-width:100%; border-radius:10px; cursor:pointer;" onclick="window.open('${msg.imageUrl}')">` : msg.text;
            html+=`<div class="bubble-wrap ${isMine?'mine':'theirs'}"><div class="bubble">${content}</div><div class="msg-meta">${formatTime(msg.timestamp)} ${ticks}</div></div>`;
        });
        G('msg-area').innerHTML=html; setTimeout(()=>G('msg-area').scrollTop=G('msg-area').scrollHeight,50);
    });
}

function closeChat(){ G('sidebar').classList.remove('hide'); G('chat-main').classList.remove('active'); G('empty-state').style.display='flex'; G('active-chat').style.display='none'; activeChatUid=null; activeChatId=null; }

function sendMessage(imgUrl=null){
    const text=G('msg-input').value.trim(); if(!text && !imgUrl)return;
    const ts=firebase.database.ServerValue.TIMESTAMP;
    const payload = {sender:myUser.uid, timestamp:ts, read:false};
    if(imgUrl) payload.imageUrl = imgUrl; else payload.text = text;
    
    db.ref('messages/'+activeChatId).push(payload);
    const displayMsg = imgUrl ? '📷 Photo' : text;
    
    db.ref(`chats/${myUser.uid}/${activeChatUid}`).update({name:G('chat-name').innerText, photo:G('chat-av').innerHTML.includes('img')?G('chat-av').querySelector('img').src:'', lastMessage:displayMsg, timestamp:ts, unreadCount:0});
    db.ref(`chats/${activeChatUid}/${myUser.uid}`).once('value',snap=>{
        const currentUnread=snap.exists()?(snap.val().unreadCount||0):0;
        db.ref(`chats/${activeChatUid}/${myUser.uid}`).update({name:myUser.displayName||G('sb-my-name').innerText, photo:G('dr-av').innerHTML.includes('img')?G('dr-av').querySelector('img').src:'', lastMessage:displayMsg, timestamp:ts, unreadCount:currentUnread+1});
    });
    G('msg-input').value='';
}

G('msg-input').onkeypress=e=>{if(e.key==='Enter')sendMessage();};
G('img-upload').onchange=async e=>{
    const f=e.target.files[0]; if(!f||!activeChatId)return;
    try{ const ref=storage.ref(`chat_images/${activeChatId}/${Date.now()}_${f.name}`); await ref.put(f); const url=await ref.getDownloadURL(); sendMessage(url); }catch(err){ alert(err.message); }
};
