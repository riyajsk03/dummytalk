<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>DummyTalk | Premium</title>
    <style>
        :root {
            --bg: #0e1621; --sidebar: #17212b; --header: #17212b; --accent: #2481cc;
            --sent: #2b5278; --recv: #182533; --text: #f5f5f5; --text-muted: #708499;
            --border: #1c2733; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* Sidebar & Profile Drawer */
        .sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; transition: 0.3s; }
        .drawer { position: absolute; top: 0; left: -320px; width: 320px; height: 100%; background: var(--sidebar); z-index: 100; transition: 0.3s; padding: 20px; border-right: 1px solid var(--border); }
        .drawer.open { left: 0; }

        /* Search Bar */
        .search-container { padding: 10px; background: var(--sidebar); border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; background: #242f3d; border: none; padding: 10px 15px; border-radius: 20px; color: #fff; outline: none; }

        /* Profile Header in Drawer */
        .profile-header { text-align: center; margin-bottom: 30px; }
        .av-large { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; }
        .av-large img { width: 100%; height: 100%; object-fit: cover; }

        /* Chat Window */
        .chat-main { flex: 1; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: rgba(14, 22, 33, 0.95); }
        .msg-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Bubbles & Ticks */
        .bubble { max-width: 75%; padding: 8px 12px; border-radius: 15px; position: relative; font-size: 0.95rem; }
        .mine { align-self: flex-end; background: var(--sent); border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: var(--recv); border-bottom-left-radius: 4px; }
        .tick { font-size: 0.7rem; margin-left: 5px; opacity: 0.7; }
        .read { color: #4dde9c; } /* Double tick color */

        .item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .item:hover { background: #242f3d; }
        .av-small { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .btn-action { width: 100%; padding: 12px; background: #242f3d; border: none; color: #fff; margin-top: 10px; border-radius: 8px; cursor: pointer; text-align: left; }
        .btn-action:hover { background: #2b3a4a; }

        #view-auth { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="view-chat" style="display:flex; width: 100%;">
    <div class="sidebar">
        <div class="drawer" id="profile-drawer">
            <button onclick="toggleDrawer()" style="background:none; border:none; color:var(--accent); cursor:pointer; margin-bottom:20px;">← Back</button>
            <div class="profile-header">
                <div class="av-large" id="dr-photo">?</div>
                <h3 id="dr-name">User Name</h3>
                <p id="dr-uname" style="color:var(--text-muted)">@username</p>
            </div>
            <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:5px;">Email</p>
            <p id="dr-email" style="margin-bottom:20px;">email@example.com</p>
            
            <button class="btn-action" onclick="changePassword()">🔑 Change Password</button>
            <button class="btn-action" onclick="logout()" style="color:var(--danger)">🚪 Logout</button>
        </div>

        <div class="header" style="height:60px; padding: 0 15px; display:flex; align-items:center; gap:15px; border-bottom:1px solid var(--border)">
            <div class="av-small" id="my-av" onclick="toggleDrawer()" style="cursor:pointer">?</div>
            <div style="font-weight:bold; flex:1">DummyTalk</div>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" id="user-search" placeholder="Search by username...">
        </div>
        
        <div id="contact-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div class="chat-main">
        <div class="header" style="height:60px; background:var(--header); padding:0 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border)">
            <div class="av-small" id="chat-target-av">?</div>
            <div>
                <div id="chat-target-name" style="font-weight:600">Select a contact</div>
                <div id="chat-target-status" style="font-size:0.75rem; color:var(--text-muted)">offline</div>
            </div>
        </div>

        <div class="msg-list" id="msg-list"></div>

        <div style="padding:15px; display:flex; gap:10px; background:var(--header)">
            <input type="text" id="msg-input" class="search-input" placeholder="Write a message..." style="background:#1c2733">
            <button id="send-btn" style="background:var(--accent); border:none; color:#fff; width:45px; border-radius:50%; cursor:pointer">➔</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { /* Your Config Here */ };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.database();

let currentUser = null, activeChatId = null, targetUID = null;

// --- PROFILE DRAWER ---
function toggleDrawer() { G('profile-drawer').classList.toggle('open'); }

function loadMyProfile(user) {
    db.ref('users/' + user.uid).on('value', snap => {
        const d = snap.val();
        G('my-av').innerHTML = d.photo ? `<img src="${d.photo}">` : d.name[0];
        G('dr-photo').innerHTML = d.photo ? `<img src="${d.photo}">` : d.name[0];
        G('dr-name').innerText = d.name;
        G('dr-uname').innerText = '@' + d.username;
        G('dr-email').innerText = d.email;
    });
}

// --- SEARCH & CONTACTS ---
G('user-search').oninput = (e) => {
    const q = e.target.value.toLowerCase();
    if(q.length < 2) return;
    db.ref('users').orderByChild('username').startAt(q).limitToFirst(5).once('value', snap => {
        let html = '';
        snap.forEach(child => {
            const u = child.val();
            if(u.uid === auth.currentUser.uid) return;
            html += `<div class="item" onclick="startChat('${u.uid}', '${u.name}', '${u.photo}')">
                <div class="av-small">${u.photo ? `<img src="${u.photo}" style="width:100%; height:100%; border-radius:50%">` : u.name[0]}</div>
                <div><b>${u.name}</b><br><small style="color:var(--text-muted)">@${u.username}</small></div>
            </div>`;
        });
        G('contact-list').innerHTML = html;
    });
};

// --- CHAT LOGIC ---
function startChat(uid, name, photo) {
    targetUID = uid;
    activeChatId = [auth.currentUser.uid, uid].sort().join('_');
    G('chat-target-name').innerText = name;
    G('chat-target-av').innerHTML = photo ? `<img src="${photo}" style="width:100%; height:100%; border-radius:50%">` : name[0];
    
    // Listen for presence
    db.ref('users/' + uid + '/online').on('value', s => {
        G('chat-target-status').innerText = s.val() ? 'online' : 'offline';
        G('chat-target-status').style.color = s.val() ? '#4dde9c' : '';
    });

    loadMessages();
}

function loadMessages() {
    db.ref('messages/' + activeChatId).on('value', snap => {
        let html = '';
        snap.forEach(m => {
            const msg = m.val();
            const isMine = msg.sender === auth.currentUser.uid;
            const ticks = isMine ? (msg.read ? '<span class="tick read">✓✓</span>' : '<span class="tick">✓</span>') : '';
            html += `<div class="bubble ${isMine ? 'mine' : 'theirs'}">${msg.text}${ticks}</div>`;
            
            // Mark as read if receiving
            if(!isMine && !msg.read) db.ref(`messages/${activeChatId}/${m.key}`).update({read: true});
        });
        G('msg-list').innerHTML = html;
        G('msg-list').scrollTop = G('msg-list').scrollHeight;
    });
}

G('send-btn').onclick = () => {
    const text = G('msg-input').value;
    if(!text || !activeChatId) return;
    db.ref('messages/' + activeChatId).push({
        sender: auth.currentUser.uid,
        text: text,
        timestamp: Date.now(),
        read: false
    });
    G('msg-input').value = '';
};

const G = id => document.getElementById(id);
auth.onAuthStateChanged(user => { if(user) loadMyProfile(user); });

function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
